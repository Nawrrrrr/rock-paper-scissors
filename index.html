<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <p id="resultat"></p>

  <button id="rock">Rock</button>
  <button id="paper">Paper</button>
  <button id="scissors">Scissors</button>

  <div id="score"></div>
  <div id="results"></div>

  <script>
    console.log("Hello World") 
    function getComputerChoice() {
    const choice = ["rock", "paper", "scissors"];
    return choice[Math.floor(Math.random() *3)];
    }

    

    function getHumanChoice() {
      return prompt("Rock, Paper, Scissors")
    }

    document.getElementById("rock").addEventListener("click", () => playRound("rock"));
    document.getElementById("paper").addEventListener("click", () => playRound("paper"));
    document.getElementById("scissors").addEventListener("click", () => playRound("scissors"));
    
    let humanScore = 0;
    let computerScore = 0

    function playRound(humanChoice) {
      const computerChoice = getComputerChoice();

        if ((humanChoice === "rock" && computerChoice === "scissors") ||
      (humanChoice === "paper" && computerChoice === "rock") ||
      (humanChoice === "scissors" && computerChoice === "paper")) {
      document.getElementById("results").textContent = "You win! " + humanChoice + " beats " + computerChoice;
      humanScore++ 
      }

        else if ((humanChoice === "rock" && computerChoice === "paper") ||
      (humanChoice === "paper" && computerChoice === "scissors") ||
      (humanChoice === "scissors" && computerChoice === "rock")) {
      document.getElementById("results").textContent = "You loss! " + computerChoice + " beats " + humanChoice;
      computerScore++
      }
      else {
      document.getElementById("results").textContent = "You tied ! No one took advantage";
      }
    
      document.getElementById("score").textContent = "You: " + humanScore + " | Computer: " + computerScore;
    
    if (humanScore === 5) {
      document.getElementById("resultat").textContent = "🏆 You win the game!";
    } else if (computerScore === 5) {
      document.getElementById("resultat").textContent = "💀 Computer wins the game!";
    }}
  
  </script>

</body>
</html>
